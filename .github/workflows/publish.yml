name: Publish to npm
on:
  release:
    types: [created]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: "18"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          BUNDL_SUPABASE_URL: ${{ secrets.BUNDL_SUPABASE_URL }}
          BUNDL_SUPABASE_ANON_KEY: ${{ secrets.BUNDL_SUPABASE_ANON_KEY }}
          BUNDL_API_URL: ${{ secrets.BUNDL_API_URL }}
